    <text x="717" y="152" fill="#8B949E" font-family="Consolas, 'Courier New', monospace" font-size="10" class="temp-healthy">47&#xB0;C</text>
    <!-- Temperature: fault (hidden) -->
    <text x="717" y="152" fill="#E5534B" font-family="Consolas, 'Courier New', monospace" font-size="10" class="temp-fault" opacity="0">85&#xB0;C</text>
    <!-- ECC label (hidden) -->
    <text x="717" y="165" fill="#E5534B" font-family="Consolas, 'Courier New', monospace" font-size="10" class="ecc-label" opacity="0">ECC: 8</text>
