    <rect x="717" y="118" width="16" height="16" rx="3" fill="#76B900" class="gpu"/>
    <rect x="739" y="118" width="16" height="16" rx="3" fill="#76B900" class="gpu"/>
    <rect x="761" y="118" width="16" height="16" rx="3" fill="#76B900" class="gpu"/>
