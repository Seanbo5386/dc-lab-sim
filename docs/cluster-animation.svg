    <!-- Status -->
    <text x="890" y="152" fill="#76B900" font-family="Consolas, 'Courier New', monospace" font-size="10" text-anchor="end">OK</text>
  </g>

  <!-- Node 4: dgx-04 (x=30, y=220) -->
